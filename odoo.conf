[options]
# Where Odoo looks for modules. This is the in-container mount from
# docker-compose.yml (the repo root), so our module is discovered here.
addons_path = /mnt/extra-addons

# Database connection — matches the POSTGRES_* values in docker-compose.yml.
# 'db' is the compose service name, resolvable on the compose network.
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

# Master password guarding the database-manager screen. Dev-only value.
admin_passwd = admin

# Pin the web server to a SINGLE database so localhost:8069 is deterministic.
# Without this, with several DBs in Postgres (test_tracer, test_step*, …) Odoo
# falls back to the session-cookie / database-manager, and a stale cookie can
# land the browser on an old test DB. test_tracer was created at Step 1 BEFORE
# `contacts` was added to the manifest depends, so there the module is marked
# installed while contacts is not → on load the module is skipped and every
# page 500s. db_name + dbfilter force the web to use `funedistri` only, the DB
# `make dev` creates/installs into. Override with `make dev DB=foo` if you also
# adjust this filter.
db_name = funedistri
dbfilter = ^funedistri$
