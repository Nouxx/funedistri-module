[options]
# Where Odoo looks for modules. This is the in-container mount from
# docker-compose.yml (the repo root), so our module is discovered here.
addons_path = /mnt/extra-addons

# Database connection — matches the POSTGRES_* values in docker-compose.yml.
# 'db' is the compose service name, resolvable on the compose network.
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

# Master password guarding the database-manager screen. Dev-only value.
admin_passwd = admin
